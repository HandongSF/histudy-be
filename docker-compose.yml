services:
  histudy-be:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${ACTIVE_PROFILE:-dev}
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/webapp/application-${ACTIVE_PROFILE:-dev}.yml
    volumes:
      - ${CONFIG_PATH:-/etc/histudy-be/}:/webapp/:ro
      - webapp_images:/webapp/image
      - webapp_logs:/webapp/log

volumes:
  webapp_images:
  webapp_logs:
